
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KonovalovAPI · Клиент управления клиентами</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4fa;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px;
            color: #152b44;
        }

        .app-wrapper {
            max-width: 1400px;
            width: 100%;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 32, 64, 0.3);
            padding: 32px 36px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            margin-bottom: 28px;
        }

        .auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-weight: 700;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #142d4c, #274e8f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-status {
            display: flex;
            align-items: center;
            gap: 25px;
            background: #ffffff;
            padding: 10px 24px 10px 20px;
            border-radius: 60px;
            border: 1px solid #c1d8fc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        #authBadge {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #1f4172;
            color: #1f4172;
            border-radius: 40px;
            padding: 10px 26px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

            .btn-outline:hover {
                background: #1f4172;
                color: white;
            }

        .btn-primary {
            background: #142d4c;
            border: none;
            color: white;
            padding: 14px 36px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #3060b0;
        }

            .btn-primary:hover {
                background: #1f3e68;
                transform: scale(1.02);
            }

            .btn-primary:disabled {
                opacity: 0.4;
                pointer-events: none;
            }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin: 20px 0 20px 0;
            border-bottom: 1px solid #b9d1f0;
            padding-bottom: 6px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4a5e7e;
            padding: 12px 10px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.1s;
        }

            .tab-btn.active {
                color: #142d4c;
                border-bottom-color: #142d4c;
            }

        .auth-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 25px 45px;
            align-items: flex-end;
            background: #f1f7fe;
            border-radius: 60px;
            padding: 28px 35px;
            margin-top: 12px;
            border: 1px solid #d2e3ff;
        }

        .auth-field {
            display: flex;
            flex-direction: column;
            min-width: 200px;
            flex: 1 1 220px;
        }

            .auth-field label {
                font-weight: 600;
                font-size: 0.9rem;
                color: #1f4172;
                margin-bottom: 6px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }

            .auth-field input {
                background: white;
                border: 1.5px solid #c9dafc;
                border-radius: 30px;
                padding: 16px 22px;
                font-size: 1rem;
                transition: 0.2s;
            }

                .auth-field input:focus {
                    outline: none;
                    border-color: #3060b0;
                    box-shadow: 0 0 0 3px rgba(48,96,176,0.15);
                }

        .info-bar {
            background: #e4edff;
            border-radius: 60px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
            margin: 24px 0 32px 0;
            border: 1px solid #b5cff5;
        }

        .super-badge {
            background: #142d4c;
            color: white;
            border-radius: 40px;
            padding: 8px 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .email-badge {
            background: white;
            border-radius: 40px;
            padding: 8px 30px;
            border: 1px solid #567fc9;
            font-weight: 500;
        }

        .add-panel {
            background: #f8fcff;
            border-radius: 48px;
            padding: 30px 36px;
            border: 1px solid #d3e3fd;
            margin-bottom: 40px;
            transition: opacity 0.2s;
        }

            .add-panel h3 {
                font-size: 1.8rem;
                font-weight: 600;
                margin-bottom: 28px;
                display: flex;
                align-items: center;
                gap: 12px;
            }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 18px 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1 1 200px;
        }

            .form-group label {
                font-weight: 600;
                color: #1f4172;
                margin-bottom: 6px;
            }

            .form-group input {
                padding: 16px 22px;
                border-radius: 30px;
                border: 1.5px solid #c9dafc;
                background: white;
                font-size: 1rem;
            }

        .table-wrapper {
            border-radius: 28px;
            overflow: auto;
            background: white;
            border: 1px solid #dbe6f8;
            box-shadow: 0 6px 18px rgba(0,30,60,0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }

        th {
            background: #ecf3ff;
            padding: 22px 18px;
            font-weight: 600;
            color: #10243e;
            border-bottom: 2px solid #c4d6fc;
            font-size: 0.95rem;
        }

        td {
            padding: 18px;
            border-bottom: 1px solid #e2edff;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

            .actions button {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 1.3rem;
                padding: 4px;
                border-radius: 30px;
                transition: 0.1s;
            }

        .btn-edit {
            color: #2b6ed7;
        }

        .btn-delete {
            color: #c23b3b;
        }

        .btn-edit:hover {
            background: #e5efff;
        }

        .btn-delete:hover {
            background: #ffe5e5;
        }

        .lock-icons {
            margin-left: 8px;
            color: #4f6f9f;
            opacity: 0.7;
            display: inline-flex;
            gap: 4px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #142d4c;
            color: white;
            padding: 16px 34px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,20,50,0.5);
            transform: translateY(200%);
            transition: transform 0.25s;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 12px;
        }

            .toast.show {
                transform: translateY(0);
            }

        .loading-row td {
            text-align: center;
            padding: 40px;
            color: #456f9c;
        }

        .id-badge {
            background: #e5eefc;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            display: inline-block;
        }

        .footer-note {
            margin-top: 28px;
            display: flex;
            gap: 20px;
            color: #49658c;
            background: #ecf3fd;
            padding: 16px 30px;
            border-radius: 60px;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <div class="glass-card">

            <!-- Верхняя панель с логотипом и статусом -->
            <div class="auth-header">
                <div class="logo">
                    <h1><i class="fas fa-database" style="margin-right: 12px; color: #2b6ed7;"></i>CustomersAPI · CRUD</h1>
                </div>
                <div class="auth-status" id="authStatusBlock">
                    <span id="authBadge"><i class="fas fa-lock" style="color:#c03939;"></i> Не аутентифицирован</span>
                    <button class="btn-outline" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                </div>
            </div>

            <!-- Вкладки Вход / Регистрация -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="tabLoginBtn"><i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>Вход</button>
                <button class="tab-btn" id="tabRegisterBtn"><i class="fas fa-user-plus" style="margin-right: 8px;"></i>Регистрация</button>
            </div>

            <!-- Панель входа -->
            <div id="loginPanel" class="auth-panel">
                <div class="auth-field">
                    <label>Email <i class="fas fa-asterisk" style="font-size: 8px; color:#c53030;"></i></label>
                    <input type="email" id="loginEmail" placeholder="user@example.com" value="super@test.com">
                </div>
                <div class="auth-field">
                    <label>Пароль <i class="fas fa-asterisk" style="font-size: 8px; color:#c53030;"></i></label>
                    <input type="password" id="loginPassword" placeholder="••••••" value="password">
                </div>
                <button class="btn-primary" id="loginBtn"><i class="fas fa-paper-plane"></i> Войти</button>
            </div>

            <!-- Панель регистрации (скрыта) -->
            <div id="registerPanel" class="auth-panel" style="display: none;">
                <div class="auth-field">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="new@example.com">
                </div>
                <div class="auth-field">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="минимум 6 символов">
                </div>
                <div class="auth-field">
                    <label>Имя (необязательно)</label>
                    <input type="text" id="regName" placeholder="Имя Фамилия">
                </div>
                <button class="btn-primary" id="registerBtn"><i class="fas fa-check-circle"></i> Зарегистрироваться</button>
            </div>

            <!-- Информационная панель после входа -->
            <div class="info-bar" id="userInfoBar" style="display: none;">
                <span class="super-badge" id="userNameSpan"><i class="fas fa-user-shield"></i> superuser</span>
                <span class="email-badge" id="userEmailSpan">su@demo.com</span>
                <span style="color:#1f4172;"><i class="fas fa-check-circle" style="color:#14804b;"></i> JWT активен</span>
            </div>

            <!-- Блок добавления клиента -->
            <div class="add-panel" id="addSection" style="opacity:0.5; pointer-events:none;">
                <h3><i class="fas fa-plus-circle" style="color:#2b6ed7;"></i> Добавить нового клиента</h3>
                <div class="add-form">
                    <div class="form-group">
                        <label>Имя <i class="fas fa-asterisk" style="font-size: 8px; color:#c53030;"></i></label>
                        <input type="text" id="newName" placeholder="Иван Петров">
                    </div>
                    <div class="form-group">
                        <label>Email <i class="fas fa-asterisk" style="font-size: 8px; color:#c53030;"></i></label>
                        <input type="email" id="newEmail" placeholder="ivan@example.com">
                    </div>
                    <div class="form-group">
                        <label>Адрес</label>
                        <input type="text" id="newAddress" placeholder="г. Москва, ул. Ленина">
                    </div>
                    <button class="btn-primary" id="addUserBtn"><i class="fas fa-save"></i> Добавить</button>
                </div>
            </div>

            <!-- Заголовок таблицы и кнопка обновления -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 24px 0 20px;">
                <h2 style="font-weight: 600;"><i class="fas fa-table" style="margin-right: 12px;"></i> Список клиентов</h2>
                <button class="btn-primary" id="refreshBtn" style="padding: 12px 28px;" disabled><i class="fas fa-sync-alt"></i> Обновить</button>
            </div>

            <!-- Таблица клиентов -->
            <div class="table-wrapper">
                <table id="customerTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Имя</th>
                            <th>Email</th>
                            <th>Адрес</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr class="loading-row">
                            <td colspan="5"><i class="fas fa-lock" style="margin-right: 10px;"></i> Войдите для просмотра данных</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Нижняя панель с замками (для дизайна) -->
            <div class="footer-note">
                <i class="fas fa-lock"></i> <i class="fas fa-lock"></i> <i class="fas fa-lock"></i> <i class="fas fa-lock"></i>
                <span style="margin-left: auto;">Интерфейс взаимодействует с CustomerController через JWT</span>
            </div>
        </div>
    </div>

    <!-- Toast уведомление -->
    <div id="toast" class="toast"><i class="fas fa-info-circle"></i> <span id="toastMsg">Сообщение</span></div>

    <script>
        (function () {
            // --- Конфигурация API (предполагается, что сервер на том же origin) ---
            const API_BASE = ''; // если API на другом порту, укажите 'http://localhost:5000'
            const AUTH_LOGIN_URL = API_BASE + '/api/auth/login';
            const AUTH_REGISTER_URL = API_BASE + '/api/auth/register';
            const CUSTOMERS_URL = API_BASE + '/api/customer';

            // Состояние приложения
            let token = localStorage.getItem('jwtToken') || null;

            // DOM элементы
            const loginPanel = document.getElementById('loginPanel');
            const registerPanel = document.getElementById('registerPanel');
            const tabLogin = document.getElementById('tabLoginBtn');
            const tabRegister = document.getElementById('tabRegisterBtn');
            const authBadge = document.getElementById('authBadge');
            const logoutBtn = document.getElementById('logoutBtn');
            const userInfoBar = document.getElementById('userInfoBar');
            const userNameSpan = document.getElementById('userNameSpan');
            const userEmailSpan = document.getElementById('userEmailSpan');
            const addSection = document.getElementById('addSection');
            const refreshBtn = document.getElementById('refreshBtn');
            const tableBody = document.getElementById('tableBody');
            const toastEl = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');

            // Поля ввода
            const loginEmail = document.getElementById('loginEmail');
            const loginPassword = document.getElementById('loginPassword');
            const loginBtn = document.getElementById('loginBtn');
            const regEmail = document.getElementById('regEmail');
            const regPassword = document.getElementById('regPassword');
            const regName = document.getElementById('regName');
            const registerBtn = document.getElementById('registerBtn');
            const newName = document.getElementById('newName');
            const newEmail = document.getElementById('newEmail');
            const newAddress = document.getElementById('newAddress');
            const addUserBtn = document.getElementById('addUserBtn');

            // Утилита показа уведомлений
            function showToast(text, isError = false) {
                toastMsg.innerText = text;
                toastEl.style.background = isError ? '#b53b3b' : '#142d4c';
                toastEl.classList.add('show');
                setTimeout(() => toastEl.classList.remove('show'), 2800);
            }

            // Экранирование HTML
            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // Обновление UI в зависимости от токена
            function applyAuthState() {
                if (token) {
                    authBadge.innerHTML = '<i class="fas fa-unlock-alt" style="color:#14804b;"></i> Токен есть';
                    logoutBtn.style.display = 'inline-flex';
                    userInfoBar.style.display = 'flex';
                    addSection.style.opacity = '1';
                    addSection.style.pointerEvents = 'auto';
                    refreshBtn.disabled = false;

                    // Попытка извлечь данные из токена (JWT payload)
                    try {
                        const payload = JSON.parse(atob(token.split('.')[1]));
                        userEmailSpan.innerText = payload.email || '—';
                        userNameSpan.innerHTML = '<i class="fas fa-user-shield"></i> ' + (payload.unique_name || 'Пользователь');
                    } catch (e) {
                        userEmailSpan.innerText = '—';
                    }

                    // Загружаем клиентов
                    fetchCustomers();
                } else {
                    authBadge.innerHTML = '<i class="fas fa-lock" style="color:#aa3030;"></i> Не аутентифицирован';
                    logoutBtn.style.display = 'none';
                    userInfoBar.style.display = 'none';
                    addSection.style.opacity = '0.5';
                    addSection.style.pointerEvents = 'none';
                    refreshBtn.disabled = true;
                    tableBody.innerHTML = '<tr class="loading-row"><td colspan="5"><i class="fas fa-lock" style="margin-right: 8px;"></i> Войдите для просмотра данных</td></tr>';
                }
            }

            // Загрузка списка клиентов (GET)
            async function fetchCustomers() {
                if (!token) return;
                tableBody.innerHTML = '<tr class="loading-row"><td colspan="5"><i class="fas fa-circle-notch fa-spin"></i> Загрузка...</td></tr>';
                try {
                    const resp = await fetch(CUSTOMERS_URL, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });

                    if (resp.status === 401) {
                        // Токен недействителен
                        token = null;
                        localStorage.removeItem('jwtToken');
                        applyAuthState();
                        showToast('Сессия истекла, войдите снова', true);
                        return;
                    }

                    if (!resp.ok) throw new Error(`Ошибка ${resp.status}`);
                    const customers = await resp.json();
                    renderCustomers(customers);
                } catch (err) {
                    tableBody.innerHTML = `<tr class="loading-row"><td colspan="5">Ошибка: ${escapeHtml(err.message)}</td></tr>`;
                    showToast('Не удалось загрузить клиентов', true);
                }
            }

            // Отрисовка таблицы
            function renderCustomers(customers) {
                if (!customers || customers.length === 0) {
                    tableBody.innerHTML = '<tr class="loading-row"><td colspan="5">Нет клиентов</td></tr>';
                    return;
                }
                let html = '';
                customers.forEach(c => {
                    html += `<tr>
                        <td><span class="id-badge">${c.id}</span></td>
                        <td>${escapeHtml(c.name || '')}</td>
                        <td>${escapeHtml(c.email || '')}</td>
                        <td>${escapeHtml(c.address || '')}</td>
                        <td class="actions">
                            <button class="btn-edit" onclick="editCustomer(${c.id})" title="Редактировать"><i class="fas fa-pencil-alt"></i></button>
                            <button class="btn-delete" onclick="deleteCustomer(${c.id})" title="Удалить"><i class="fas fa-trash-alt"></i></button>
                            <span class="lock-icons"><i class="fas fa-lock"></i><i class="fas fa-lock"></i><i class="fas fa-lock"></i><i class="fas fa-lock"></i></span>
                        </td>
                    </tr>`;
                });
                tableBody.innerHTML = html;
            }

            // --- CRUD операции (глобально доступны для onclick) ---
            window.editCustomer = async function (id) {
                const newName = prompt('Введите новое имя:');
                const newEmail = prompt('Введите новый email:');
                const newAddress = prompt('Введите новый адрес:');

                const response = await fetch(`/api/customer/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({
                        id: id,  // Используем тот же ID, что и в URL
                        name: newName,
                        email: newEmail,
                        address: newAddress
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    alert('Ошибка: ' + (data.error || JSON.stringify(data)));
                } else {
                    alert('Клиент обновлен!');
                    fetchCustomers(); // Обновить таблицу
                }
            };

            window.deleteCustomer = async function (id) {
                if (!token) return;
                if (!confirm('Удалить клиента?')) return;
                try {
                    const resp = await fetch(`${CUSTOMERS_URL}/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (!resp.ok) throw new Error('Ошибка удаления');
                    showToast('Клиент удалён');
                    fetchCustomers();
                } catch (err) {
                    showToast(err.message, true);
                }
            };

            // Добавление клиента
            addUserBtn.addEventListener('click', async () => {
                if (!token) return;
                const name = newName.value.trim();
                const email = newEmail.value.trim();
                const address = newAddress.value.trim();
                if (!name || !email) {
                    showToast('Имя и email обязательны', true);
                    return;
                }
                try {
                    const resp = await fetch(CUSTOMERS_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({ name, email, address })
                    });
                    if (!resp.ok) throw new Error('Ошибка создания');
                    showToast('Клиент добавлен');
                    newName.value = ''; newEmail.value = ''; newAddress.value = '';
                    fetchCustomers();
                } catch (err) {
                    showToast(err.message, true);
                }
            });

            // --- Аутентификация ---
            async function login(email, password) {
                try {
                    const resp = await fetch(AUTH_LOGIN_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    if (!resp.ok) {
                        const errText = await resp.text();
                        throw new Error(`Ошибка ${resp.status}: ${errText}`);
                    }
                    const data = await resp.json();
                    // ожидаем поле token (согласно AuthResponse.cs)
                    token = data.token;
                    localStorage.setItem('jwtToken', token);
                    applyAuthState();
                    showToast('Успешный вход');
                } catch (err) {
                    showToast('Ошибка входа: ' + err.message, true);
                }
            }

            async function register(email, password, name = '') {
                try {
                    const resp = await fetch(AUTH_REGISTER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, name })
                    });
                    if (!resp.ok) throw new Error('Регистрация не удалась');
                    showToast('Регистрация успешна, теперь войдите');
                    showLoginPanel();
                } catch (err) {
                    showToast(err.message, true);
                }
            }

            loginBtn.addEventListener('click', () => {
                login(loginEmail.value, loginPassword.value);
            });

            registerBtn.addEventListener('click', () => {
                register(regemail.value, regpassword.value, regname.value);
            });

            logoutBtn.addEventListener('click', () => {
                token = null;
                localStorage.removeItem('jwtToken');
                applyAuthState();
                showToast('Вы вышли');
            });

            refreshBtn.addEventListener('click', () => {
                if (token) fetchCustomers();
            });

            // Переключение вкладок
            function showLoginPanel() {
                loginPanel.style.display = 'flex';
                registerPanel.style.display = 'none';
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
            }
            function showRegisterPanel() {
                loginPanel.style.display = 'none';
                registerPanel.style.display = 'flex';
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
            }
            tabLogin.addEventListener('click', showLoginPanel);
            tabRegister.addEventListener('click', showRegisterPanel);

            // Инициализация состояния
            applyAuthState();

            // Делаем функции глобально доступными
            window.editCustomer = editCustomer;
            window.deleteCustomer = deleteCustomer;
        })();
    </script>
</body>
</html>
